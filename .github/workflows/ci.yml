name: MOM CI

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --workspace --all-targets --verbose
        env:
          RUST_BACKTRACE: full

      - name: Run doc tests
        run: cargo test --doc --all

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-clippy-${{ hashFiles('**/Cargo.lock') }}

      - run: cargo clippy --all --all-targets -- -D warnings

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    # rustsec/audit-check needs to publish a check run via the Checks API.
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # SurrealDB 2.x upgrade (#51) cleared the six RUSTSEC advisories from
          # surrealdb 1.5.6. Remaining suppressions are unmaintained/unsound
          # transitives with no identified exploit path in MOM usage.
          #
          #   RUSTSEC-2025-0141  bincode 1.3.3         ← surrealdb 2.x transitive
          #   RUSTSEC-2023-0089  atomic-polyfill 1.0.3 ← deep transitive
          #   RUSTSEC-2026-0002  lru 0.12.5            ← surrealkv transitive (unsound)
          #   RUSTSEC-2025-0134  rustls-pemfile 1.0.4  ← reqwest transitive
          #
          # NOTE: comma-separated only (not newline-delimited). See run 26068334372.
          ignore: RUSTSEC-2025-0141,RUSTSEC-2023-0089,RUSTSEC-2026-0002,RUSTSEC-2025-0134

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage
        run: cargo tarpaulin --out Xml --all

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false

  ts-client:
    name: TS Client Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: packages/mom-ts

      - name: Build and typecheck
        run: bun run build
        working-directory: packages/mom-ts
