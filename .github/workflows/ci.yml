name: MOM CI

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --all --lib --verbose
        env:
          RUST_BACKTRACE: full

      - name: Run doc tests
        run: cargo test --doc --all

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-clippy-${{ hashFiles('**/Cargo.lock') }}

      - run: cargo clippy --all --all-targets -- -D warnings

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    # rustsec/audit-check needs to publish a check run via the Checks API.
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # All ignores below are against transitive dependencies that
          # cannot be cleared from the current dep graph. Each entry is
          # tagged with the parent so the suppression can be removed once
          # the parent is bumped. Tracking issues: #5–#11.
          #
          # Unmaintained (no CVE):
          #   RUSTSEC-2025-0141  bincode 1.3.3         ← introduced by surrealdb 2.x upgrade in this PR
          #   RUSTSEC-2023-0089  atomic-polyfill 1.0.3 ← deep transitive
          #
          # Unsound (informational; no exploit path identified in current usage):
          #   RUSTSEC-2026-0002  lru 0.12.5            ← transitive
          #
          # NOTE: this input is comma-separated, not newline-delimited.
          # rustsec/audit-check@v2.0.0 does NOT split the literal block
          # scalar — the newline form arrives at `cargo audit --ignore`
          # as a single argument with embedded newlines and parses as
          # one malformed advisory ID (see run 26068334372). Verified
          # against CI logs. Do not "fix" back to the `|` form.
          ignore: RUSTSEC-2025-0141,RUSTSEC-2023-0089,RUSTSEC-2026-0002

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage
        run: cargo tarpaulin --out Xml --all

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false
