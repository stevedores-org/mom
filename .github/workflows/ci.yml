name: MOM CI

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (1.76.0)
        uses: dtolnay/rust-toolchain@1.76.0
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --all --lib --verbose
        env:
          RUST_BACKTRACE: full

      - name: Run doc tests
        run: cargo test --doc --all

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.76.0
        with:
          components: rustfmt

      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.76.0
        with:
          components: clippy

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-clippy-${{ hashFiles('**/Cargo.lock') }}

      - run: cargo clippy --all --all-targets -- -D warnings

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    # rustsec/audit-check needs to publish a check run via the Checks API.
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # All ignores below are against transitive dependencies that
          # cannot be cleared from the current dep graph. Each entry is
          # tagged with the parent so the suppression can be removed once
          # the parent is bumped. Tracking issues: #5–#11.
          #
          # Unmaintained (no CVE):
          #   RUSTSEC-2025-0141  bincode 1.3.3        ← surrealdb 2.x (still pulls bincode 1.x)
          #   RUSTSEC-2023-0089  atomic-polyfill 1.0.3 ← deep transitive
          #
          # Unsound (informational, no exploit path):
          #   RUSTSEC-2026-0002  lru 0.12.5           ← transitive
          #   RUSTSEC-2026-0097  rand 0.8.5 / 0.9.2   ← transitive (both versions present)
          ignore: RUSTSEC-2025-0141,RUSTSEC-2023-0089,RUSTSEC-2026-0002,RUSTSEC-2026-0097

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.76.0

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage
        run: cargo tarpaulin --out Xml --all

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false
