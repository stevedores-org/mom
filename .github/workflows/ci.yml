name: MOM CI

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --all --lib --verbose
        env:
          RUST_BACKTRACE: full

      - name: Run doc tests
        run: cargo test --doc --all

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-clippy-${{ hashFiles('**/Cargo.lock') }}

      - run: cargo clippy --all --all-targets -- -D warnings

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    # rustsec/audit-check needs to publish a check run via the Checks API.
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # All ignores below are advisories against transitive dependencies
          # we cannot upgrade in-place. Tracking issues for each are filed
          # against the repo; remove the corresponding entry when the parent
          # dep is bumped and the audit is re-run.
          #
          # Unmaintained advisories (no CVE, maintenance status only):
          #   RUSTSEC-2025-0141  bincode 1.3.3        ← surrealdb 1.5.6 / revision
          #   RUSTSEC-2024-0370  proc-macro-error 1.0.4 ← surrealdb 1.5.6 / revision-derive
          #   RUSTSEC-2025-0010  ring 0.16.20         ← surrealdb 1.5.6 / surrealdb-jsonwebtoken
          #   RUSTSEC-2025-0134  rustls-pemfile 1.0.4 ← reqwest 0.11.27
          #   RUSTSEC-2023-0089  atomic-polyfill 1.0.3 ← transitive
          #
          # Vulnerability advisories (real CVEs — see filed tracking issues):
          #   RUSTSEC-2024-0358  object_store 0.8.0   AWS WebIdentityToken log exposure (CVE-2024-41178)
          #   RUSTSEC-2025-0009  ring 0.16.20         AES panic / QUIC DoS (CVE-2025-4432)
          #   RUSTSEC-2023-0071  rsa 0.9.10           Marvin timing sidechannel (CVE-2023-49092, no patch upstream)
          #   RUSTSEC-2026-0098  rustls-webpki 0.101.7 URI name constraints ignored
          #   RUSTSEC-2026-0099  rustls-webpki 0.101.7 wildcard name constraints accepted
          #   RUSTSEC-2026-0104  rustls-webpki 0.101.7 CRL parsing panic (DoS)
          ignore: |
            RUSTSEC-2025-0141
            RUSTSEC-2024-0370
            RUSTSEC-2025-0010
            RUSTSEC-2025-0134
            RUSTSEC-2023-0089
            RUSTSEC-2024-0358
            RUSTSEC-2025-0009
            RUSTSEC-2023-0071
            RUSTSEC-2026-0098
            RUSTSEC-2026-0099
            RUSTSEC-2026-0104

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage
        run: cargo tarpaulin --out Xml --all

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false
