apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Local-dev overlay for OrbStack (single-node k3s). One replica, image loaded
# directly into containerd via `orb push` or `docker load`, no PVC, no
# pull-secret. In-memory store only — fine for smoke tests, ephemeral.

namespace: mom-dev

resources:
  - ../../base

namePrefix: dev-

images:
  - name: SET_BY_OVERLAY/mom
    newName: mom
    newTag: dev

replicas:
  - name: mom
    count: 1

patches:
  - target:
      kind: Deployment
      name: mom
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
